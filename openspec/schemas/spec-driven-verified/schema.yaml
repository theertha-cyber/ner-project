name: spec-driven-verified
version: 1
description: >
  Spec-driven workflow with ADRs and a mandatory verification plan.
  Pipeline: proposal → specs → design → adr → verification → tasks.
  verification.md is a gate artifact — the change cannot be archived
  until the Evidence Log is complete and the Audit Record is signed off
  by a human reviewer.

artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document establishing WHY this change is needed
    template: proposal.md
    instruction: >
      Create the proposal document that establishes WHY this change is needed.

      Sections:

      - **Why**: 1-2 sentences on the problem or opportunity. What problem does
        this solve? Why now?

      - **What Changes**: Bullet list of changes. Be specific about new
        capabilities, modifications, or removals. Mark breaking changes with
        **BREAKING**.

      - **Capabilities**: Identify which specs will be created or modified:
          - **New Capabilities**: List capabilities being introduced. Each becomes
            a new `specs/<name>/spec.md`. Use kebab-case names (e.g.,
            `user-auth`, `data-export`).
          - **Modified Capabilities**: List existing capabilities whose
            REQUIREMENTS are changing (not just implementation details). Each
            needs a delta spec file. Check `openspec/specs/` for existing spec
            names. Leave empty if no requirement changes.

      - **Impact**: Affected code, APIs, dependencies, or systems.

      - **Open Questions**: Unknowns or assumptions that need confirmation before
        implementation begins.

      IMPORTANT: The Capabilities section creates the contract between proposal
      and specs phases. Research existing specs under `openspec/specs/` before
      filling this in. Each capability listed here will need a corresponding
      spec file.

      Keep it concise (1-2 pages). Focus on the "why" not the "how" —
      implementation details belong in design.md. Durable architectural
      decisions are captured in ADRs after the design step.

      This is the foundation — specs, design, adr, verification, and tasks all
      build on this.
    requires: []

  - id: specs
    generates: specs/**/*.md
    description: Delta specification files defining WHAT the system should do
    template: spec.md
    instruction: >
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's Capabilities
      section.

      - New capabilities: use the exact kebab-case name from the proposal
        (specs/<capability>/spec.md).
      - Modified capabilities: use the existing spec folder name from
        openspec/specs/<capability>/ when creating the delta spec at
        specs/<capability>/spec.md.

      Delta operations (use ## headers exactly so OpenSpec archive can merge):

      - **ADDED Requirements**: New capabilities.
      - **MODIFIED Requirements**: Changed behaviour — MUST include the full
        updated requirement content, not a partial diff.
      - **REMOVED Requirements**: Deprecated features — MUST include **Reason**
        and **Migration**.
      - **RENAMED Requirements**: Name changes only — use FROM:/TO: format.

      Format requirements:

      - Each requirement: `### Requirement: <name>` followed by description.
      - Use SHALL (mandatory), SHOULD (recommended), or MAY (optional) —
        never "should" or "may" in lowercase without the normative weight.
      - Each scenario: `#### Scenario: <name>` with GIVEN/WHEN/THEN steps.
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (####). Using 3
        hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.
      - Every scenario MUST have at least a WHEN and a THEN step. GIVEN is
        strongly recommended for precondition clarity.

      MODIFIED requirements workflow:

      1. Locate the existing requirement in openspec/specs/<capability>/spec.md.
      2. Copy the ENTIRE requirement block (from `### Requirement:` through all
         scenarios).
      3. Paste under `## MODIFIED Requirements` and edit to reflect new behaviour.
      4. Ensure header text matches exactly (whitespace-insensitive).

      Common pitfall: Using MODIFIED with partial content loses detail at
      archive time. If adding new concerns without changing existing behaviour,
      use ADDED instead.

      Specs must be testable — each scenario is a potential acceptance test and
      will be mapped directly into verification.md.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document explaining HOW to implement the change
    template: design.md
    instruction: >
      Create the design document that explains HOW to implement the change.

      When to include design.md (create only if any apply):

      - Cross-cutting change (multiple services/modules) or new architectural
        pattern.
      - New external dependency or significant data model changes.
      - Security, performance, or migration complexity.
      - Ambiguity that benefits from technical decisions before coding.

      Prior decisions (read existing ADRs first):

      Before writing, list every file in docs/adr/. Build the supersession
      graph from each ADR's Supersedes field — an ADR is no longer in force
      if a later ADR's Supersedes points at it. Only the currently-in-force ADRs
      (accepted, not superseded) constrain this design. Older superseded ADRs are
      historical context only and MUST NOT be treated as live commitments. New
      design choices MUST be coherent with the in-force set. If a current ADR
      needs to be revisited, do not propose modifying it; flag it under Open
      Questions and let the adr step record a new superseding ADR.

      Sections:

      - **Context**: Background, current state, constraints, stakeholders.
      - **Goals / Non-Goals**: What this design achieves and explicitly excludes.
      - **Decisions**: Key technical choices with rationale (why X over Y?).
        Include alternatives considered for each decision.
      - **Risks / Trade-offs**: Known limitations and things that could go wrong.
        Format: [Risk] → Mitigation.
      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable).
      - **Open Questions**: Outstanding decisions or unknowns to resolve.
        Include any in-force ADRs that this design suggests revisiting — the
        adr step will record the supersession.

      Focus on architecture and approach, not line-by-line implementation.
      Reference the proposal for motivation and specs for requirements.
      Good design docs explain the "why" behind technical decisions.
    requires:
      - proposal

  - id: adr
    generates: "../../../docs/adr/*.md"
    description: >
      Architecture Decision Records distilled from design — persisted at
      docs/adr/ and immutable once accepted
    template: adr.md
    instruction: >
      Distill significant decisions from design.md into Architecture Decision
      Records that live in docs/adr/ and persist across changes. The path
      docs/adr/ means the repository's docs/adr/ folder — ADR files MUST be
      written there and MUST NOT be written under openspec/changes/<change>/.

      IRON RULE — ADRs are immutable once accepted. You MUST NOT edit a prior
      ADR file under any circumstance (not its Status, not its body, not its
      date — nothing). To change a previously accepted decision, record a NEW
      ADR whose Status is "accepted, supersedes ADR-NNN" and whose Supersedes
      field names the prior one. The prior ADR's contents stay frozen as a
      historical record.

      ADR filename format: ADR-NNN-<kebab-title>.md where NNN is a 3-digit
      sequence one greater than the highest existing (e.g.,
      ADR-042-use-postgres-for-catalog.md). Sequence is monotonic across the
      whole repo and never reused.

      Process:

      1. Read every existing ADR in docs/adr/. Build the supersession graph
         from each ADR's Supersedes field. Note the highest sequence number in
         use.

      2. Re-read design.md. Identify decisions that meet ALL of these:
         - Establish a long-term architectural commitment (pattern, technology,
           boundary, contract) — not a tactical implementation detail.
         - Will affect future changes beyond this one.
         - Either aren't already captured by a currently-in-force ADR, OR
           intentionally diverge from one (in which case the new ADR supersedes
           the prior).

      3. For each qualifying decision, create a NEW file at
         docs/adr/ADR-NNN-<kebab-title>.md. Use the adr.md template (MADR-short
         style). If this decision replaces a prior in-force ADR, set Status to
         "accepted, supersedes ADR-NNN", populate the Supersedes field, and
         explain in Context why the prior decision is being revisited. Do NOT
         touch the prior ADR's file — leave it exactly as it was.

      4. If nothing meets the bar, do not invent ADRs. The step still completes
         as long as docs/adr/ already contains at least one ADR file.
    requires:
      - design

  - id: verification
    generates: verification.md
    description: >
      Verification plan capturing spec alignment, acceptance criteria, hallucination
      risks, pattern/ADR compliance, and evidence requirements — gate artifact
      required before archive
    template: verification.md
    instruction: >
      Create verification.md that synthesises specs, design, and ADRs into a
      complete verification plan that a human reviewer uses to confirm the change
      is functional, spec-aligned, and auditable before archiving.

      Process:

      1. Spec Alignment table.
         Read every spec file in specs/**/*.md for this change.
         For each requirement and each scenario, create one row. The Acceptance
         Criterion column restates the GIVEN/WHEN/THEN as a binary pass/fail
         assertion that is observable (not implementation-specific) — e.g.
         "Given a logged-in user, when they request CSV export, then a CSV file
         is returned with all user records". Leave Verification Artifact blank —
         the tasks step will fill it in. Leave Status unchecked.
         CRITICAL: Every requirement and every scenario from every spec file in
         this change must appear in this table. Missing a scenario is a P1 gap.

      2. Hallucination Risk Register.
         Review design.md for areas of complexity: new patterns, external
         dependencies, data model changes, security controls, cross-cutting
         concerns, non-obvious edge cases.
         For each risk area, identify what an AI agent might get wrong (e.g.,
         inventing field names not in spec, applying the wrong pattern, silently
         dropping an error path, misreading a GIVEN precondition). State a
         concrete human-checkable mitigation for each risk. Aim for 3-7 entries.
         Do not invent risks without basis in design.md.

      3. Pattern & ADR Compliance.
         List every currently-in-force ADR in docs/adr/ that constrains this
         change (as identified in design.md). For each, state the constraint it
         imposes and a concrete verification step that confirms the implementation
         honours it. If design.md references no ADRs, state "No constraining
         ADRs" and leave the table with a single placeholder row.

      4. Evidence Requirements.
         Functional: at least one evidence item per spec scenario. Each item must
         name the specific scenario it covers and what observable output
         constitutes proof — test output showing the scenario passing, a
         screenshot, log excerpt, or API trace. Format every item as - [ ].
         Structural: include code review confirmation of design.md decisions and
         an ADR compliance check.
         Edge Case: at least one item per Hallucination Risk from step 2.

      5. Evidence Log and Audit Record.
         Leave the Evidence Log table with placeholder rows — it is filled in by
         the human reviewer during and after apply.
         Leave the Audit Record checkboxes unchecked — they are signed off by the
         human reviewer before archive.

      CRITICAL RULES:
      - Do not fabricate evidence entries.
      - Do not pre-check any checkbox in Evidence Requirements, Evidence Log, or
        Audit Record sections.
      - verification.md is a gate artifact: the change MUST NOT be archived until
        the Evidence Log is populated with real evidence and the Audit Record is
        signed off by a human reviewer.
    requires:
      - specs
      - design
      - adr

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with verification and evidence tasks
    template: tasks.md
    instruction: >
      Create the task list that breaks down the implementation work.

      IMPORTANT: Follow the template exactly. The apply phase parses checkbox
      format to track progress. Tasks not using `- [ ]` won't be tracked.

      Guidelines:

      - Group related tasks under ## numbered headings.
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`.
      - Tasks should be small enough to complete in one session.
      - Order tasks by dependency (what must be done first?).
      - For every spec scenario in verification.md § Spec Alignment, include
        a paired verification task that names the test file/type that satisfies
        it. Fill in the Verification Artifact column in verification.md for each.

      REQUIRED final group — Verification & Evidence:

      Add a final task group titled "Verification & Evidence" containing at
      minimum these tasks (adjust numbering to follow your last group):

        - [ ] N.1 Run all acceptance-criteria tests for every scenario in
          verification.md § Spec Alignment and confirm all pass.
        - [ ] N.2 Collect functional evidence (screenshot / test output / log)
          for each scenario — one entry per row in verification.md § Evidence Log.
        - [ ] N.3 Confirm every Hallucination Risk mitigation step in
          verification.md § Hallucination Risk Register.
        - [ ] N.4 Confirm all ADR compliance steps in verification.md
          § Pattern & ADR Compliance.
        - [ ] N.5 Complete Audit Record sign-off in verification.md § Audit Record
          (human reviewer required).
        - [ ] N.6 Run `openspec validate <change> --type change --strict`
          before archive.

      Reference specs for WHAT to build, design for HOW to build it, docs/adr/
      for durable architectural commitments to honour, and verification.md for
      the evidence that must be gathered.

      Each task must be verifiable — you know exactly when it is done.
    requires:
      - specs
      - adr
      - verification

apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Read context files (proposal.md, specs, design.md, docs/adr/, verification.md,
    tasks.md), work through pending tasks, and mark complete as you go.

    Verification gate:
    - Before marking any functional task complete, confirm its paired
      verification artifact in verification.md § Spec Alignment exists and passes.
    - Before the final "Verification & Evidence" group tasks are marked complete,
      the human reviewer must have populated verification.md § Evidence Log and
      signed off verification.md § Audit Record.
    - Do NOT mark the change ready for archive while verification.md contains
      unchecked items in Evidence Requirements or an unsigned Audit Record.

    Pause if you hit blockers or need clarification.
