version: "3.9"
services:
  postgres-test:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ner
      POSTGRES_PASSWORD: ner
      POSTGRES_DB: ner_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ner -d ner_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "alembic upgrade head && python -m src.gateway.seed"
    restart: "no"
    env_file: .env
    environment:
      NER_DATABASE_URL: "postgresql+asyncpg://ner:ner@postgres-test:5432/ner_dev"
      NER_DATABASE_URL_SYNC: "postgresql://ner:ner@postgres-test:5432/ner_dev"
    depends_on:
      postgres-test:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: deploy/k8s/mlflow/Dockerfile
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://ner:ner@postgres-test:5432/ner_mlflow
      --default-artifact-root s3://ner-platform/mlflow/
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      postgres-test:
        condition: service_healthy
      minio:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn src.gateway.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      NER_DATABASE_URL: "postgresql+asyncpg://ner:ner@postgres-test:5432/ner_dev"
      NER_REDIS_URL: "redis://redis:6379/0"
      NER_MINIO_ENDPOINT: "minio:9000"
      NER_DOCUMENT_SERVICE_URL: "http://document_service:8000"
      NER_MODEL_SERVING_URL: "http://model_serving:8000"
      NER_CHAT_API_PORT: 8006
      NER_CHAT_API_URL: "http://host.docker.internal:8006"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  chat_api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn src.chat_api.main:app --host 0.0.0.0 --port 8000
    # src/chat_api/ (renamed from chat-api for Python import compatibility)
    ports:
      - "8006:8000"
    env_file: .env
    environment:
      NER_DATABASE_URL: "postgresql+asyncpg://ner:ner@postgres-test:5432/ner_dev"
      NER_MODEL_SERVING_URL: "http://model_serving:8000"
      NER_CHAT_API_PORT: 8006
    depends_on:
      postgres-test:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  document_service:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn src.document_service.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      NER_DATABASE_URL: "postgresql+asyncpg://ner:ner@postgres-test:5432/ner_dev"
      NER_MINIO_ENDPOINT: "minio:9000"
    depends_on:
      postgres-test:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  extraction_service:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn src.extraction_service.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8002:8000"
    env_file: .env
    environment:
      NER_DATABASE_URL: "postgresql+asyncpg://ner:ner@postgres-test:5432/ner_dev"
      NER_REDIS_URL: "redis://redis:6379/0"
      NER_CELERY_BROKER_URL: "redis://redis:6379/0"
      NER_CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      NER_DOCUMENT_SERVICE_URL: "http://document_service:8000"
      NER_MODEL_SERVING_URL: "http://model_serving:8000"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  model_serving:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn src.model_serving.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8004:8000"
    env_file: .env
    environment:
      NER_DATABASE_URL: "postgresql+asyncpg://ner:ner@postgres-test:5432/ner_dev"
      NER_MINIO_ENDPOINT: "minio:9000"
      NER_MLFLOW_TRACKING_URI: "http://mlflow:5000"

  annotation_service:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn src.annotation_service.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8005:8000"
    env_file: .env
    environment:
      NER_DATABASE_URL: "postgresql+asyncpg://ner:ner@postgres-test:5432/ner_dev"
    depends_on:
      postgres-test:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  training_service:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn src.training_service.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8003:8000"
    env_file: .env
    environment:
      NER_DATABASE_URL: "postgresql+asyncpg://ner:ner@postgres-test:5432/ner_dev"
      NER_REDIS_URL: "redis://redis:6379/0"
      NER_CELERY_BROKER_URL: "redis://redis:6379/0"
      NER_CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      NER_MINIO_ENDPOINT: "minio:9000"
      NER_MLFLOW_TRACKING_URI: "http://mlflow:5000"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A src.training_service.celery_app worker --loglevel=info --concurrency=1
    env_file: .env
    environment:
      NER_DATABASE_URL: "postgresql+asyncpg://ner:ner@postgres-test:5432/ner_dev"
      NER_DATABASE_URL_SYNC: "postgresql://ner:ner@postgres-test:5432/ner_dev"
      NER_REDIS_URL: "redis://redis:6379/0"
      NER_CELERY_BROKER_URL: "redis://redis:6379/0"
      NER_CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      NER_MINIO_ENDPOINT: "minio:9000"
      NER_TRAINING_DEVICE: "cpu"
      NER_MLFLOW_TRACKING_URI: "http://mlflow:5000"
    volumes:
      - .:/app
    depends_on:
      postgres-test:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  celery_worker_extraction:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A src.extraction_service.celery_app worker -Q extraction --pool=solo --loglevel=info
    env_file: .env
    environment:
      NER_DATABASE_URL: "postgresql+asyncpg://ner:ner@postgres-test:5432/ner_dev"
      NER_DATABASE_URL_SYNC: "postgresql://ner:ner@postgres-test:5432/ner_dev"
      NER_REDIS_URL: "redis://redis:6379/0"
      NER_CELERY_BROKER_URL: "redis://redis:6379/0"
      NER_CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      NER_DOCUMENT_SERVICE_URL: "http://document_service:8000"
      NER_MODEL_SERVING_URL: "http://model_serving:8000"
    volumes:
      - .:/app
    depends_on:
      postgres-test:
        condition: service_healthy
      redis:
        condition: service_healthy
      document_service:
        condition: service_started
      model_serving:
        condition: service_started
      db-init:
        condition: service_completed_successfully

volumes:
  minio-data:
  postgres-data:
