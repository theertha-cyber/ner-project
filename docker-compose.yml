version: "3.9"
services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ner
      POSTGRES_PASSWORD: ner
      POSTGRES_DB: ner_dev
    ports:
      - "54320:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ner -d ner_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  training_service:
    build:
      context: .
      dockerfile: src/training_service/Dockerfile
    ports:
      - "8003:8000"
    environment:
      NER_DATABASE_URL: "postgresql+asyncpg://ner:ner@postgres-test:5432/ner_dev"
      NER_REDIS_URL: "redis://redis:6379/0"
      NER_CELERY_BROKER_URL: "redis://redis:6379/0"
      NER_CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      NER_JWT_SECRET: "change-me-in-production"
      NER_MINIO_ENDPOINT: "minio:9000"
      NER_MLFLOW_TRACKING_URI: "http://mlflow:5000"
    depends_on:
      postgres-test:
        condition: service_healthy
      redis:
        condition: service_healthy

  mlflow:
    build:
      context: .
      dockerfile: deploy/k8s/mlflow/Dockerfile
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://ner:ner@postgres-test:5432/ner_mlflow
      --default-artifact-root s3://ner-platform/mlflow/
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      postgres-test:
        condition: service_healthy
      minio:
        condition: service_started

  celery_worker:
    build:
      context: .
      dockerfile: src/training_service/Dockerfile
    command: celery -A src.training_service.celery_app worker --loglevel=info --concurrency=1
    environment:
      NER_DATABASE_URL: "postgresql+asyncpg://ner:ner@postgres-test:5432/ner_dev"
      NER_DATABASE_URL_SYNC: "postgresql://ner:ner@postgres-test:5432/ner_dev"
      NER_REDIS_URL: "redis://redis:6379/0"
      NER_CELERY_BROKER_URL: "redis://redis:6379/0"
      NER_CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      NER_JWT_SECRET: "change-me-in-production"
      NER_MINIO_ENDPOINT: "minio:9000"
      NER_TRAINING_DEVICE: "cpu"
      NER_MLFLOW_TRACKING_URI: "http://mlflow:5000"
    volumes:
      - .:/app
    depends_on:
      postgres-test:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  minio-data:
